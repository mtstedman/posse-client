# Canonical operator copy. GitHub executes the required in-repository mirror.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: posse

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        # The public package intentionally does not publish a package-lock.json.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      # Existing ATLAS/MCP JSDoc debt keeps the full typecheck from passing
      # today. Keep it visible in CI, then remove continue-on-error once the
      # baseline is paid down enough to become a required gate.
      - name: Typecheck audit
        continue-on-error: true
        run: npm run typecheck

      # The clean-client publication strips the private test harness. Validate
      # the shipped runtime and package surface instead of naming removed files.
      - name: Validate public client
        run: |
          node --check orchestrator.js
          npm pack --dry-run --ignore-scripts
