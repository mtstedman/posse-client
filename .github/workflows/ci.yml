# Canonical operator copy. GitHub executes the required in-repository mirror.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: posse

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: posse/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Existing ATLAS/MCP JSDoc debt keeps the full typecheck from passing
      # today. Keep it visible in CI, then remove continue-on-error once the
      # baseline is paid down enough to become a required gate.
      - name: Typecheck audit
        continue-on-error: true
        run: npm run typecheck

      - name: Run focused tests
        run: |
          node --test test/test-posse-remote-composer.test.js
          node --test test/test-posse-remote-parity.test.js
          node --test --test-concurrency=1 test/test-atlas-native-jina-encoder.test.js test/test-embedding-resource-pool.test.js test/test-atlas-v2-reader-lane.test.js test/test-atlas-v2-readiness.test.js
          node --test test/core/suites/provider-aliases.test.js
          npm run test:scheduler:fast
