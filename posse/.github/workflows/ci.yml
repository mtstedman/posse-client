name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint touched domains
        run: >
          npx eslint
          lib/catalog/settings.js
          lib/domains/atlas/classes/v2/RemoteAtlasEmbeddingEncoder.js
          lib/domains/integrations/functions/deterministic-mcp/remote-tool-surface.js
          lib/domains/providers/classes/ClaudeCliNotFoundError.js
          lib/domains/providers/classes/InteractiveCliSession.js
          lib/domains/providers/classes/index.js
          lib/domains/providers/functions/claude.js
          lib/domains/providers/functions/codex.js
          lib/domains/providers/functions/helpers/interactive-cli-session.js
          lib/domains/remote/classes/RemoteAtlasEncoderClient.js
          lib/domains/remote/classes/RemoteComposer.js
          lib/domains/remote/classes/RemotePromptClient.js
          lib/domains/remote/classes/index.js
          lib/domains/remote/functions/atlas-encoder-client.js
          lib/domains/remote/functions/client.js
          lib/domains/remote/functions/mode.js
          lib/domains/remote/functions/model-catalog-refresh.js
          lib/domains/remote/functions/prompt-bundle.js
          lib/domains/remote/functions/readiness.js
          lib/domains/scheduler/classes/HeldQueueLockIndex.js
          lib/domains/scheduler/classes/index.js
          lib/domains/scheduler/functions/held-locks.js
          lib/domains/settings/functions/catalog.js
          test/core/suites/provider-aliases.test.js
          test/test-atlas-v2-embeddings.test.js
          test/test-posse-remote-composer.test.js
          test/test-posse-remote-parity.test.js

      - name: Run focused tests
        run: |
          node --test test/test-posse-remote-composer.test.js
          node --test test/test-posse-remote-parity.test.js
          node --test test/test-atlas-v2-embeddings.test.js
          node --test test/core/suites/provider-aliases.test.js
          npm run test:scheduler:fast
