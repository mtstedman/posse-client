name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate vector golden fixtures
        run: |
          node scripts/generate-vector-fixtures.mjs --output .tmp/vector-golden
          POSSE_VECTOR_FIXTURE_CANONICAL=.tmp/vector-golden npm run check:vector-fixtures

      - name: Lint
        run: npm run lint

      # Existing ATLAS/MCP JSDoc debt keeps the full typecheck from passing
      # today. Keep it visible in CI, then remove continue-on-error once the
      # baseline is paid down enough to become a required gate.
      - name: Typecheck audit
        continue-on-error: true
        run: npm run typecheck

      - name: Run focused tests
        run: |
          node --test test/test-posse-remote-composer.test.js
          node --test test/test-posse-remote-parity.test.js
          node --test --test-concurrency=1 test/test-atlas-v2-embeddings-resource-selection.test.js test/test-atlas-v2-embeddings-index.test.js test/test-atlas-v2-embeddings-e2e.test.js test/test-atlas-v2-embeddings-fallback-ondemand.test.js
          node --test test/core/suites/provider-aliases.test.js
          npm run test:scheduler:fast
